name: Enforce Testing Requirements

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  comprehensive-testing:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    
    - name: Run unit tests
      run: |
        pytest --tb=short -v
    
    - name: Run code quality checks
      run: |
        black --check app/ tests/
        isort --check-only app/ tests/
        ruff check app/ tests/
        mypy app/
        bandit -r app/
    
    - name: Start application for API tests
      run: |
        python run_dev.py &
        sleep 10
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SECRET_KEY: test_secret_key_for_ci
        REDIS_URL: redis://localhost:6379/0
    
    - name: Run API smoke tests
      run: |
        make test-api
    
    - name: Check that single document endpoint is removed
      run: |
        # Should return 404
        response=$(curl -s -w "%{http_code}" "http://localhost:8000/api/v1/extract" -X POST -H "Content-Type: application/json" -d '{}')
        if [[ "$response" != *"404"* ]]; then
          echo "❌ Single document endpoint should return 404 but didn't"
          exit 1
        fi
        echo "✅ Single document endpoint correctly returns 404"
    
    - name: Test coverage report
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false